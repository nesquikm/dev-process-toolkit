# Default `## Release Files` block for a Kotlin / Gradle project.
# Copied into the host project's CLAUDE.md by /setup; reach for `kind: regex`
# if your README "Latest:" line uses a non-standard shape.
files:
  - path: gradle.properties
    kind: regex
    pattern: '^version=(?<version>\d+\.\d+\.\d+)'
    replace: 'version={version}'
  - path: CHANGELOG.md
    kind: changelog
  - path: README.md
    kind: regex
    pattern: 'Latest: \*\*v(?<version>\d+\.\d+\.\d+) — '
    replace: 'Latest: **v{version} — '
    optional: true
