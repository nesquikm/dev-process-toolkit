name: Gate Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  gate-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Typecheck
        run: mypy .

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest
