# Default `## Release Files` block for a Flutter / Dart project.
# `pubspec.yaml` versions carry an optional `+<build>` suffix; the yaml
# bumper preserves it on rewrite.
files:
  - path: pubspec.yaml
    kind: yaml
    field: version
  - path: CHANGELOG.md
    kind: changelog
  - path: README.md
    kind: regex
    pattern: 'Latest: \*\*v(?<version>\d+\.\d+\.\d+) — '
    replace: 'Latest: **v{version} — '
    optional: true
